name = "edu-realtime"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"
assets = { directory = ".open-next/assets", binding = "ASSETS" }

# ── Environment variables ─────────────────────────────────────────────────
# Set secrets with: npx wrangler secret put JWT_SECRET
# Non-secret vars can go here directly:

[vars]
NEXT_PUBLIC_APP_URL = "https://edu-realtime.YOUR_SUBDOMAIN.workers.dev"

# ── D1 Database ───────────────────────────────────────────────────────────
# Created with: npx wrangler d1 create edu-realtime
# Paste the database_id from that command below:

[[d1_databases]]
binding = "DB"            # NOT used directly — app uses D1 HTTP REST API
database_name = "edu-realtime"
database_id = "6b05fb47-8e99-4565-9128-ac94a62135a0"


